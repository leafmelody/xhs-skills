name: xhs_get_note_detail
description: |
  获取小红书笔记详情，包括正文、图片、互动数据及评论列表。
  需要配合 search_notes Skill 获取的 note_id 和 xsec_token 使用。

input_schema:
  type: object
  properties:
    note_id:
      type: string
      description: 笔记 ID（从搜索结果中获取）
    xsec_token:
      type: string
      description: 安全令牌（从搜索结果中获取）
    load_comments:
      type: boolean
      description: 是否加载评论
      default: true
    max_comments:
      type: integer
      description: 最大评论数量（0=不限）
      default: 20
      minimum: 0
      maximum: 100
  required: [note_id, xsec_token]

examples:
  - input:
      note_id: "69c64eff000000002100459f"
      xsec_token: "ABKgBuFBZhgQZRAbtlr_Fq0rt1wNGklKHnXle5g7awcgY="
      load_comments: true
      max_comments: 20
    description: 获取指定笔记详情及前20条评论
